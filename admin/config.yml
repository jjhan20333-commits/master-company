backend:
  name: github
  repo: jjhan20333-commits/master-company
  branch: main

media_folder: "image"
public_folder: "/image"

collections:
  - name: "gallery"
    label: "갤러리"
    folder: "image"
    create: true

    fields:
      - { label: "제목", name: "title", widget: "string" }
      - { label: "이미지", name: "image", widget: "image" }
